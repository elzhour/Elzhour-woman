[build]
  command   = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/zohour-handball run build"
  publish   = "artifacts/zohour-handball/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
